<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #4b0013;
      --surface: #6d0019;
      --card: #8b1e3f;
      --border: #b03a48;
      --accent: #800020;
      --accent2: #b03a48;
      --green: #34d399;
      --red: #f87171;
      --yellow: #fbbf24;
      --text: #e8eaf0;
      --muted: #6b7280;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: linear-gradient(135deg, #4b0013, #800020, #b03a48);
      color: var(--text);
      font-family: var(--font-head);
      min-height: 100vh;
      padding: 0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 36px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-badge {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 20px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .logout-btn {
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 6px 14px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.75rem;
      font-family: var(--font-mono);
      transition: all 0.3s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .logout-btn:hover {
      background: rgba(248, 113, 113, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 36px 24px 60px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .section-label {
      font-size: 0.65rem;
      font-family: var(--font-mono);
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .payment-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
      transition: all 0.2s;
    }

    .payment-card:hover {
      border-color: var(--accent);
      background: rgba(91, 124, 250, 0.05);
    }

    .payment-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .payment-reason {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .payment-amount {
      color: var(--green);
      font-family: var(--font-mono);
      font-size: 1.2rem;
      font-weight: 700;
    }

    .payment-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .detail-item {
      font-size: 0.85rem;
    }

    .detail-label {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .detail-value {
      color: var(--text);
    }

    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-family: var(--font-mono);
      font-weight: 600;
    }

    .status-paid {
      background: rgba(52, 211, 153, 0.15);
      color: var(--green);
    }

    .status-pending {
      background: rgba(251, 191, 36, 0.15);
      color: var(--yellow);
    }

    .status-unpaid {
      background: rgba(248, 113, 113, 0.15);
      color: var(--red);
    }

    .upi-link {
      display: inline-block;
      color: var(--accent);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 8px 16px;
      border: 1px solid var(--accent);
      border-radius: 8px;
      transition: all 0.2s;
    }

    .upi-link:hover {
      background: rgba(91, 124, 250, 0.1);
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 0.85rem;
      font-family: var(--font-mono);
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 0.85rem;
      font-family: var(--font-mono);
    }

    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--card);
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-family: var(--font-mono);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.3s;
      pointer-events: none;
      z-index: 999;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 640px) {
      header {
        padding: 16px 20px;
        flex-direction: column;
        gap: 10px;
      }
      main {
        padding: 20px 14px 40px;
      }
      .payment-details {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Student Dashboard</h1>
  </div>
  <div style="display: flex; gap: 16px; align-items: center;">
    <span class="header-badge" id="userBadge">LOADING…</span>
    <button class="logout-btn" type="button" onclick="handleLogout()">Logout</button>
  </div>
</header>

<main>

  <div>
    <p class="section-label">Your Pending Payments</p>
    <div id="paymentsContainer">
      <div class="loading">Loading payments…</div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script src="supabase.js"></script>
<script src="student.js"></script>
</body>
</html>
