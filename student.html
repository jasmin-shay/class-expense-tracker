<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClassPay — Student Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <link rel="stylesheet" href="student.css" />
</head>
<body>

<div class="bg-gradient"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
  
<!-- ── HEADER ── -->
<header>
  <div class="header-left">
    <a href="index.html" class="header-logo">CLASS<span>PAY</span></a>
    <div class="header-divider"></div>
    <span class="header-title">Student Dashboard</span>
  </div>
  <div class="header-right">
    <span class="user-badge" id="userBadge">Loading…</span>
    <button class="logout-btn" onclick="handleLogout()">Logout</button>
  </div>

  <div class="header-right">

<button class="notify-btn" onclick="openNotifications()">
🔔
<span id="notifyCount" class="notify-count">0</span>
</button>

<span class="user-badge" id="userBadge">Loading...</span>

<button class="logout-btn" onclick="handleLogout()">Logout</button>

</div>
</header>

<!-- ── MAIN ── -->
<main>

  <!-- STUDENT PROFILE CARD -->
  <div class="profile-card" id="profileCard">
    <div class="profile-avatar" id="profileAvatar">—</div>

    <div class="profile-info">
      <div class="profile-eyebrow">
        <span class="eyebrow-dot"></span>
        Student Profile
      </div>
      <div class="profile-name" id="profileName">Loading…</div>
      <div class="profile-chips">
        <div class="profile-chip">
          <span class="chip-label">Reg. No</span>
          <span class="chip-sep">|</span>
          <span class="chip-value" id="profileReg">—</span>
        </div>
        <div class="profile-chip">
          <span class="chip-label">Class</span>
          <span class="chip-sep">|</span>
          <span class="chip-value" id="profileClass">—</span>
        </div>
      </div>
    </div>

    <div class="profile-stats">
      <div class="pstat">
        <div class="pstat-num" id="statTotal">—</div>
        <div class="pstat-lbl">Total</div>
      </div>
      <div class="pstat">
        <div class="pstat-num green" id="statPaid">—</div>
        <div class="pstat-lbl">Paid</div>
      </div>
      <div class="pstat">
        <div class="pstat-num red" id="statDue">—</div>
        <div class="pstat-lbl">Due</div>
      </div>
    </div>
  </div>

  <!-- PAYMENTS LIST -->
  <div>
    <div class="section-head">
      <span class="section-head-label">Your Payments</span>
      <div class="section-head-diamond"></div>
      <div class="section-head-line"></div>
    </div>

    <div id="paymentsContainer">
      <div class="state-msg">
        <div class="loading-dots">
          <span></span><span></span><span></span>
        </div>
        <p>Loading your payments</p>
      </div>
    </div>
  </div>

</main>

<!-- TOAST -->
<div id="toast">
  <span class="toast-dot"></span>
  <span id="toastMsg"></span>
</div>

<script src="supabase.js"></script>
<script src="student.js"></script>
</body>
</html>
