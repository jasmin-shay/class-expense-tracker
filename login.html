<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class Expense Tracker - Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <!-- LEFT SIDE FORM -->
      <div class="login-form">
        <h2>Welcome Back</h2>
        <p>Access your class expense dashboard</p>

        <div class="form-group">
          <label for="role">Role</label>
          <select id="role">
            <option value="student">Student</option>
            <option value="leader">Class Leader</option>
            <option value="teacher">Teacher</option>
          </select>
        </div>

        <div class="form-group">
          <label for="username">Username / Register Number</label>
          <input type="text" id="username" placeholder="e.g., 1001 or admin" />
        </div>

        <div class="form-group">
          <label for="password">Password / DOB (DDMMYYYY)</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>

        <button id="loginBtn" class="login-btn" onclick="handleLogin()">Login</button>

        <div id="errorMsg" style="color: #f87171; margin-top: 12px; font-size: 0.85rem; display: none;"></div>
      </div>

      <!-- RIGHT SIDE IMAGE -->
      <div class="login-image">
        <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=500" alt="team" />
      </div>
    </div>
  </div>

  <div id="toast" style="position: fixed; bottom: 20px; right: 20px; background: #1a1e2a; border: 1px solid #5b7cfa; color: #e8eaf0; padding: 12px 20px; border-radius: 8px; font-size: 0.85rem; display: none; z-index: 999;"></div>

  <script src="supabase.js"></script>
  <script src="auth.js"></script>
</body>
</html>
