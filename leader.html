<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ClassPay — Leader Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <link rel="stylesheet" href="leader.css" />
</head>
<body>

<div class="bg-gradient"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- ── HEADER ── -->
<header>
  <div class="header-left">
    <a href="index.html" class="header-logo">CLASS<span>PAY</span></a>
    <div class="header-divider"></div>
    <span class="header-title">Leader Dashboard</span>
  </div>
  <div class="header-right">
    <span class="user-badge" id="userBadge">Loading…</span>
    <button class="logout-btn" onclick="handleLogout()">Logout</button>
  </div>
</header>

<!-- ── MAIN ── -->
<main>

  <!-- LEADER PROFILE CARD -->
  <div class="profile-card" id="profileCard">
    <div class="profile-avatar" id="profileAvatar">—</div>

    <div class="profile-info">
      <div class="profile-eyebrow">
        <span class="eyebrow-dot"></span>
        Leader Profile
      </div>
      <div class="profile-name" id="profileName">Loading…</div>
      <div class="profile-chips">
        <div class="profile-chip">
          <span class="chip-label">Reg. No</span>
          <span class="chip-sep">|</span>
          <span class="chip-value" id="profileReg">—</span>
        </div>
        <div class="profile-chip">
          <span class="chip-label">Class</span>
          <span class="chip-sep">|</span>
          <span class="chip-value" id="profileClass">—</span>
        </div>
      </div>
    </div>

    <div class="profile-stats">
      <div class="pstat">
        <div class="pstat-num" id="statEvents">—</div>
        <div class="pstat-lbl">Events</div>
      </div>
      <div class="pstat">
        <div class="pstat-num green" id="statPaid">—</div>
        <div class="pstat-lbl">Paid</div>
      </div>
      <div class="pstat">
        <div class="pstat-num red" id="statPending">—</div>
        <div class="pstat-lbl">Pending</div>
      </div>
    </div>
  </div>

  <!-- CREATE PAYMENT EVENT -->
  <div>
    <div class="section-head">
      <span class="section-head-label">New Payment Event</span>
      <div class="section-head-diamond"></div>
      <div class="section-head-line"></div>
    </div>

    <div class="create-card">
      <div class="create-form">
        <div class="field">
          <label>Reason</label>
          <input id="reason" placeholder="e.g. Farewell, Sports kit, Trip fee" />
        </div>
        <div class="field">
          <label>Amount (₹)</label>
          <input id="amount" type="number" placeholder="500" min="1" />
        </div>
        <div class="field">
          <label>Due Date</label>
          <input id="dueDate" type="date" />
        </div>
        <button class="btn-create" id="createBtn" type="button" onclick="createPayment()">
          <span>+ Create Event</span>
        </button>
      </div>
    </div>
  </div>

  <!-- EVENTS LIST -->
  <div>
    <div class="section-head">
      <span class="section-head-label">Payment Events</span>
      <div class="section-head-diamond"></div>
      <div class="section-head-line"></div>
    </div>

    <div id="eventsContainer">
      <div class="state-msg">
        <div class="loading-dots">
          <span></span><span></span><span></span>
        </div>
        <p>Loading events</p>
      </div>
    </div>
  </div>

</main>

<!-- NOTIFICATION BELL -->
<button class="notif-bell" id="notifBell" onclick="toggleNotifPanel()" title="Notifications">
  🔔
  <span class="notif-count" id="notifCount" style="display:none">0</span>
</button>

<!-- NOTIFICATION PANEL -->
<div class="notif-panel" id="notifPanel">
  <div class="notif-panel-header">
    <span>Notifications</span>
    <button onclick="clearNotifications()" class="clear-btn">Clear all</button>
  </div>
  <div id="notifList">
    <div class="notif-empty">No notifications yet</div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal" onclick="closeEditModal(event)">
  <div class="modal">
    <div class="modal-header">
      <span>Edit Payment Event</span>
      <button onclick="closeEditModalBtn()" class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Reason</label>
        <input id="editReason" placeholder="Reason" />
      </div>
      <div class="field">
        <label>Amount (₹)</label>
        <input id="editAmount" type="number" placeholder="500" />
      </div>
      <div class="field">
        <label>Due Date</label>
        <input id="editDueDate" type="date" />
      </div>
      <button class="btn-create" onclick="saveEdit()" style="width:100%;margin-top:8px;">Save Changes</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast">
  <span class="toast-dot"></span>
  <span id="toastMsg"></span>
</div>

<script src="supabase.js"></script>
<script src="leader.js"></script>
</body>
</html>
