      --green: #34d399;
      --red: #f87171;
      --yellow: #fbbf24;
      --text: #e8eaf0;
      --muted: #6b7280;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: linear-gradient(135deg, #4b0013, #800020, #b03a48);
      color: var(--text);
      font-family: var(--font-head);
      min-height: 100vh;
      padding: 0;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 36px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-badge {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 20px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .logout-btn {
      background: rgba(248,113,113,0.12);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 6px 14px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.75rem;
      font-family: var(--font-mono);
      transition: all 0.3s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .logout-btn:hover {
      background: rgba(248,113,113,0.2);
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    }

    /* ── LAYOUT ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 36px 24px 60px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 0.65rem;
      font-family: var(--font-mono);
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* ── CREATE PAYMENT CARD ── */
    .create-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
    }
    .create-card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .create-card h2 span.dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 8px var(--accent);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1.5fr auto;
      gap: 12px;
      align-items: end;
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 0.68rem;
      font-family: var(--font-mono);
      color: var(--muted);
      letter-spacing: 0.08em;
    }
    .field input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      font-family: var(--font-head);
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91,124,250,0.15);
    }
    .field input::placeholder { color: var(--muted); }
    .btn-create {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 25px;
      padding: 11px 22px;
      color: #fff;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .btn-create:hover { 
      opacity: 0.9; 
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    }
    .btn-create:active { transform: scale(0.97); }
    .btn-create:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── EVENTS TOGGLE BUTTON ── */
    .events-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 25px;
      padding: 18px 24px;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
      text-align: left;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .events-toggle:hover { 
      border-color: var(--accent); 
      background: var(--surface); 
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    }
    .events-toggle .toggle-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .events-toggle .toggle-icon {
      width: 38px; height: 38px;
      background: rgba(91,124,250,0.12);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .events-toggle .toggle-title {
      font-size: 1rem;
      font-weight: 700;
    }
    .events-toggle .toggle-sub {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: var(--font-mono);
      margin-top: 2px;
    }
    .events-toggle .chevron {
      color: var(--muted);
      font-size: 1.1rem;
      transition: transform 0.3s;
    }
    .events-toggle.open .chevron { transform: rotate(180deg); }

    /* ── EVENTS PANEL ── */
    .events-panel {
      display: none;
      flex-direction: column;
      gap: 16px;
      animation: slideDown 0.25s ease;
    }
    .events-panel.open { display: flex; }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── EVENT CARD ── */
    .event-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .event-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 22px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .event-header:hover { background: rgba(255,255,255,0.03); }
    .event-header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .event-num {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--accent);
      background: rgba(91,124,250,0.12);
      padding: 3px 8px;
      border-radius: 6px;
    }
    .event-title { font-weight: 700; font-size: 0.95rem; }
    .event-amount {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--green);
    }
    .event-header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .event-stats {
      display: flex;
      gap: 10px;
    }
    .stat-pill {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      padding: 3px 9px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .stat-pill.paid { background: rgba(52,211,153,0.12); color: var(--green); }
    .stat-pill.unpaid { background: rgba(248,113,113,0.12); color: var(--red); }
    .event-chevron {
      color: var(--muted);
      font-size: 0.9rem;
      transition: transform 0.25s;
    }
    .event-card.open .event-chevron { transform: rotate(180deg); }

    /* ── STUDENT TABLE ── */
    .student-panel {
      display: none;
      border-top: 1px solid var(--border);
      padding: 0 22px 18px;
    }
    .event-card.open .student-panel { display: block; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
    }
    thead tr {
      border-bottom: 1px solid var(--border);
    }
    th {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      padding: 8px 12px;
      text-align: left;
    }
    td {
      padding: 10px 12px;
      font-size: 0.85rem;
      border-bottom: 1px solid rgba(37,42,56,0.6);
    }
    tr:last-child td { border-bottom: none; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .badge.paid { background: rgba(52,211,153,0.12); color: var(--green); }
    .badge.pending { background: rgba(251,191,36,0.12); color: var(--yellow); }
    .badge.unpaid { background: rgba(248,113,113,0.12); color: var(--red); }
    .badge:hover { opacity: 0.8; }
    .upi-link {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--accent);
      text-decoration: none;
    }
    .upi-link:hover { text-decoration: underline; }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 0.85rem;
      font-family: var(--font-mono);
    }

    /* ── LOADING ── */
    .loading {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 0.85rem;
      font-family: var(--font-mono);
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--card);
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-family: var(--font-mono);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.error {
      border-color: var(--red);
      background: rgba(248,113,113,0.1);
    }
    #toast.success {
      border-color: var(--green);
      background: rgba(52,211,153,0.1);
    }

    @media (max-width: 640px) {
      .form-row { grid-template-columns: 1fr 1fr; }
      .btn-create { grid-column: 1 / -1; }
      header { padding: 16px 20px; }
      main { padding: 20px 14px 40px; }
      .event-stats { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Leader Dashboard</h1>
  </div>
  <div style="display: flex; gap: 16px; align-items: center;">
    <span class="header-badge" id="userBadge">LOADING…</span>
    <button class="logout-btn" type="button" onclick="handleLogout()">Logout</button>
  </div>
</header>

<main>

  <!-- CREATE PAYMENT -->
  <div>
    <p class="section-label">New Payment Event</p>
    <div class="create-card">
      <h2><span class="dot"></span> Create Payment Event</h2>
      <div class="form-row">
        <div class="field">
          <label>Reason</label>
          <input id="reason" placeholder="e.g. Trip fee, Sports kit" />
        </div>
        <div class="field">
          <label>Amount (₹)</label>
          <input id="amount" type="number" placeholder="500" min="1" />
        </div>
        <div class="field">
          <label>UPI ID / QR Link</label>
          <input id="upi" placeholder="name@upi or https://..." />
        </div>
        <button class="btn-create" id="createBtn" type="button" onclick="createPayment()">+ Create</button>
      </div>
    </div>
  </div>

  <!-- EVENTS TOGGLE -->
  <div>
    <p class="section-label">Payment Events</p>
    <button class="events-toggle" id="eventsToggle" type="button" onclick="toggleEvents()">
      <div class="toggle-left">
        <div class="toggle-icon">📋</div>
        <div>
          <div class="toggle-title">Events</div>
          <div class="toggle-sub" id="toggleSub">Loading events…</div>
        </div>
      </div>
      <span class="chevron">▼</span>
    </button>

    <div class="events-panel" id="eventsPanel">
      <div id="eventsList"></div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script src="supabase.js"></script>
<script src="leader.js"></script>
</body>
</html>
